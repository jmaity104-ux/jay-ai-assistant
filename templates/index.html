<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JAY AI</title>

<style>

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #0b0f19;
  color: white;
}

.layout {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */

.sidebar {
  width: 250px;
  background: #111726;
  padding: 20px;
  border-right: 1px solid #222;
  display: flex;
  flex-direction: column;
}

.sidebar h2 {
  font-size: 16px;
  margin-bottom: 15px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  background: #7c3aed;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

.sidebar button:hover {
  background: #6d28d9;
}

.sidebar ul {
  list-style: none;
  padding: 0;
  margin-top: 20px;
  overflow-y: auto;
  flex: 1;
}

.sidebar li {
  padding: 10px;
  cursor: pointer;
  border-radius: 5px;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #aaa;
}

.sidebar li:hover {
  background: #1a2135;
  color: white;
}

.sidebar li.active {
  background: #1a2135;
  color: white;
}

/* MAIN CHAT */

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  padding: 15px 20px;
  border-bottom: 1px solid #222;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 10px;
}

.header .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 6px #22c55e;
}

.header .model-tag {
  font-size: 12px;
  color: #7c3aed;
  background: rgba(124,58,237,0.1);
  border: 1px solid rgba(124,58,237,0.3);
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: auto;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.chat::-webkit-scrollbar { width: 4px; }
.chat::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

/* MESSAGES */

.msg {
  margin-bottom: 15px;
  display: flex;
  flex-direction: column;
}

.msg.user {
  align-items: flex-end;
}

.msg.bot {
  align-items: flex-start;
}

.bubble {
  display: inline-block;
  padding: 10px 15px;
  border-radius: 10px;
  max-width: 75%;
  font-size: 14px;
  line-height: 1.6;
  text-align: left;
}

.user .bubble {
  background: #7c3aed;
  border-bottom-right-radius: 3px;
}

.bot .bubble {
  background: #1b2235;
  border: 1px solid #2a3350;
  border-bottom-left-radius: 3px;
}

/* CODE BLOCKS inside bubble */

.bubble pre {
  background: #0a0c10;
  border: 1px solid #7c3aed;
  border-radius: 8px;
  padding: 12px;
  overflow-x: auto;
  margin: 8px 0;
}

.bubble pre code {
  color: #a78bfa;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  white-space: pre;
}

.bubble code {
  background: #0a0c10;
  color: #a78bfa;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
}

/* Voice label */

.voice-label {
  font-size: 11px;
  color: #f59e0b;
  margin-bottom: 4px;
  padding-left: 2px;
}

/* Typing indicator */

.typing {
  display: flex;
  gap: 5px;
  padding: 14px 16px;
  background: #1b2235;
  border: 1px solid #2a3350;
  border-radius: 10px;
  width: fit-content;
}

.typing span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #7c3aed;
  animation: bounce 1.2s ease-in-out infinite;
}

.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.30s; }

@keyframes bounce {
  0%,80%,100% { transform: translateY(0); opacity: 0.4; }
  40%          { transform: translateY(-5px); opacity: 1; }
}

/* WAVEFORM */

#wave {
  width: 100%;
  height: 40px;
  background: #0b0f19;
}

/* INPUT AREA */

.input {
  display: flex;
  padding: 15px;
  border-top: 1px solid #222;
  gap: 8px;
  align-items: center;
}

#msg {
  flex: 1;
  padding: 10px 14px;
  border: none;
  border-radius: 6px;
  background: #1b2235;
  color: white;
  font-size: 14px;
  outline: none;
  border: 1px solid #2a3350;
}

#msg:focus {
  border-color: #7c3aed;
}

#msg::placeholder {
  color: #555;
}

button.send {
  padding: 10px 18px;
  background: #7c3aed;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

button.send:hover {
  background: #6d28d9;
}

#mic {
  padding: 10px 14px;
  background: #1b2235;
  border: 1px solid #2a3350;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}

#mic:hover {
  border-color: #7c3aed;
}

#mic.recording {
  background: rgba(239,68,68,0.2);
  border-color: #ef4444;
  animation: micpulse 1s ease-in-out infinite;
}

@keyframes micpulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
  50%      { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
}

</style>
</head>


<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Chats</h2>
    <button onclick="newChat()">+ New Chat</button>
    <ul id="history"></ul>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">
      <div class="dot"></div>
      JAY AI
      <span class="model-tag">LLaMA 3.3 · Groq</span>
    </div>

    <div class="chat" id="chat"></div>

    <canvas id="wave"></canvas>

    <div class="input">
      <input id="msg" placeholder="Ask JAY AI anything..." onkeydown="if(event.key==='Enter') send()">
      <button class="send" onclick="send()">Send</button>
      <button id="mic">🎤</button>
    </div>

  </div>
</div>


<script>

/* ── State ── */
let chats   = []
let current = []   // full conversation history [{role, content}]
let busy    = false


/* ── Format AI response (render code blocks, bold, etc.) ── */
function format(text) {

  // Fenced code blocks  ```lang\ncode```
  text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, function(_, lang, code) {
    var safe = code.trim()
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
    return '<pre><code>' + safe + '</code></pre>'
  })

  // Inline code  `code`
  text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>')

  // Bold  **text**
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')

  // Line breaks
  text = text.replace(/\n/g, '<br>')

  return text
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}


/* ── Add message bubble ── */
function add(role, text, isVoice) {

  const chat = document.getElementById('chat')

  const div = document.createElement('div')
  div.className = 'msg ' + role

  if (isVoice && role === 'user') {
    div.innerHTML = '<div class="voice-label">🎤 voice</div><div class="bubble">' + escHtml(text) + '</div>'
  } else if (role === 'bot') {
    div.innerHTML = '<div class="bubble">' + format(text) + '</div>'
  } else {
    div.innerHTML = '<div class="bubble">' + escHtml(text) + '</div>'
  }

  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
}


/* ── Typing indicator ── */
function showTyping() {
  const chat = document.getElementById('chat')
  const div  = document.createElement('div')
  div.className = 'msg bot'
  div.id = 'typing'
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>'
  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
}

function hideTyping() {
  const t = document.getElementById('typing')
  if (t) t.remove()
}


/* ── Chat history sidebar ── */
function saveToHistory() {
  if (current.length === 0) return
  chats.push([...current])
  renderHistory()
}

function renderHistory() {
  const list = document.getElementById('history')
  list.innerHTML = ''
  chats.forEach(function(c, i) {
    const li = document.createElement('li')
    // Use first user message as title
    const first = c.find(function(m){ return m.role === 'user' })
    li.textContent = first ? first.content.slice(0, 30) : ('Chat ' + (i+1))
    li.onclick = function() { loadChat(i) }
    list.appendChild(li)
  })
}

function loadChat(i) {
  current = [...chats[i]]
  const box = document.getElementById('chat')
  box.innerHTML = ''
  current.forEach(function(m) {
    add(m.role === 'user' ? 'user' : 'bot', m.content)
  })
}

function newChat() {
  saveToHistory()
  current = []
  document.getElementById('chat').innerHTML = ''
}


/* ── Send text message ── */
async function send() {

  if (busy) return

  const input = document.getElementById('msg')
  const text  = input.value.trim()
  if (!text) return

  input.value = ''
  add('user', text)

  // Keep full history for context
  current.push({ role: 'user', content: text })

  busy = true
  showTyping()

  try {

    // Build messages array from full history
    const messages = current.map(function(m) {
      return { role: m.role, content: m.content }
    })

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: messages, stream: false })
    })

    const data = await res.json()
    hideTyping()

    add('bot', data.reply)
    current.push({ role: 'assistant', content: data.reply })

    speak(data.reply)

  } catch(e) {
    hideTyping()
    add('bot', 'Something went wrong. Is the server running?')
  } finally {
    busy = false
  }

}


/* ── Text to Speech ── */
function speak(text) {
  if (!window.speechSynthesis) return
  const utt   = new SpeechSynthesisUtterance(text)
  utt.rate    = 1
  utt.pitch   = 1
  speechSynthesis.cancel()
  speechSynthesis.speak(utt)
}


/* ── Voice Recording ── */
let recorder  = null
let chunks    = []
let recording = false

const mic = document.getElementById('mic')

mic.onclick = async function() {

  if (!recording) {

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true })

    startWave(stream)

    recorder = new MediaRecorder(stream, { mimeType: 'audio/webm' })
    chunks   = []

    recorder.ondataavailable = function(e) { chunks.push(e.data) }

    recorder.start()
    mic.classList.add('recording')
    recording = true

  } else {

    recorder.stop()
    mic.classList.remove('recording')
    recording = false

    recorder.onstop = async function() {

      const blob = new Blob(chunks, { type: 'audio/webm' })
      const form = new FormData()
      form.append('audio', blob, 'voice.webm')

      busy = true

      try {
        const res  = await fetch('/api/voice', { method: 'POST', body: form })
        const data = await res.json()

        if (data.transcript) {
          add('user', data.transcript, true)
          add('bot', data.reply)
          current.push({ role: 'user',      content: data.transcript })
          current.push({ role: 'assistant', content: data.reply })
          speak(data.reply)
        }
      } catch(e) {
        add('bot', 'Voice error. Try again.')
      } finally {
        busy = false
      }

    }

  }

}


/* ── Waveform Visualiser ── */
let audioCtx  = null
let analyser  = null
let dataArray = null

function startWave(stream) {
  audioCtx = new AudioContext()
  const source = audioCtx.createMediaStreamSource(stream)
  analyser = audioCtx.createAnalyser()
  source.connect(analyser)
  dataArray = new Uint8Array(analyser.frequencyBinCount)
  drawWave()
}

function drawWave() {
  requestAnimationFrame(drawWave)
  if (!analyser) return
  analyser.getByteFrequencyData(dataArray)
  const canvas = document.getElementById('wave')
  const ctx    = canvas.getContext('2d')
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  dataArray.forEach(function(v, i) {
    const h = v / 2
    ctx.fillStyle = '#7c3aed'
    ctx.fillRect(i * 3, 40 - h, 2, h)
  })
}

</script>

</body>
</html>
